name: Build Ilusion Cars Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Unzip source
        run: unzip ilusion_cars_mod_src.zip
      - name: Build mod
        run: cd ilusion_cars && chmod +x gradlew && ./gradlew build --no-daemon
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ilusioncar-mod
          path: ilusion_cars/build/libs/*.jar
