name: Build Ilusion Cars Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Download Forge MDK
        run: wget https://maven.minecraftforge.net/net/minecraftforge/forge/1.16.5-36.2.39/forge-1.16.5-36.2.39-mdk.zip && unzip forge-1.16.5-36.2.39-mdk.zip -d forge_mdk
      - name: Unzip source
        run: unzip ilusion_cars_mod_src.zip
      - name: Setup and build
        run: |
          FOLDER=$(ls -d */ | grep -i ilusion | head -1 | tr -d '/')
          cp forge_mdk/gradlew $FOLDER/
          cp forge_mdk/gradlew.bat $FOLDER/
          cp -r forge_mdk/gradle $FOLDER/
          cp forge_mdk/settings.gradle $FOLDER/ || true
          sed -i 's/gradle-7.3.3-bin.zip/gradle-6.8.1-bin.zip/g' $FOLDER/gradle/wrapper/gradle-wrapper.properties
          sed -i "s/mappings channel: 'official', version: '1.16.5'/mappings channel: 'snapshot', version: '20210309-1.16.5'/g" $FOLDER/build.gradle
          cd $FOLDER && chmod +x gradlew && ./gradlew build --no-daemon
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ilusioncar-mod
          path: "*/build/libs/*.jar"
          
